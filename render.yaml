services:
  # Backend Web Service (Spring Boot)
  - type: web
    name: smart-campus-backend
    runtime: java
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: "./mvnw clean package -DskipTests"
    startCommand: "java -jar target/backend-0.0.1-SNAPSHOT.jar"
    envVars:
      - key: ALLOWED_ORIGINS
        fromService:
          type: web
          name: smart-campus-frontend
          property: url

  # Frontend Static Site (React/Vite)
  - type: web
    name: smart-campus-frontend
    runtime: static
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: "dist"
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: smart-campus-backend
          property: url
    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"
