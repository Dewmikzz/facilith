services:
  # Backend Web Service (Spring Boot via Docker)
  - type: web
    name: smart-campus-backend
    runtime: docker
    region: oregon # Web services can have a region
    plan: free
    rootDir: backend
    envVars:
      - key: ALLOWED_ORIGINS
        fromService:
          type: static_site
          name: smart-campus-frontend
          property: host

  # Frontend Static Site (React/Vite)
  - type: static_site
    name: smart-campus-frontend
    # Static sites do not have a region or a plan field in the Blueprint
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    publishDir: "dist"
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: smart-campus-backend
          property: host
    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"
