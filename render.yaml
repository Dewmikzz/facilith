services:
  # Backend Web Service (Spring Boot)
  - type: web
    name: smart-campus-backend
    env: java
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: "./mvnw clean package -DskipTests"
    startCommand: "java -jar target/backend-0.0.1-SNAPSHOT.jar"
    envVars:
      - key: ALLOWED_ORIGINS
        fromService:
          type: static
          name: smart-campus-frontend
          property: url
      # You will need to add FIREBASE_SERVICE_ACCOUNT_JSON as a secret file or env var in Render Dashboard

  # Frontend Static Site (React/Vite)
  - type: static
    name: smart-campus-frontend
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    publishDir: "dist"
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: smart-campus-backend
          property: url
    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"
