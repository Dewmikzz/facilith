services:
  # Backend Web Service (Spring Boot via Docker)
  - type: web
    name: smart-campus-backend
    runtime: docker
    plan: free
    region: oregon
    rootDir: backend
    envVars:
      - key: ALLOWED_ORIGINS
        fromService:
          type: static
          name: smart-campus-frontend
          property: host

  # Frontend Static Site (React/Vite)
  - type: web
    name: smart-campus-frontend
    runtime: static
    rootDir: frontend
    buildCommand: "npm install && npm run build"
    staticPublishPath: "dist"
    # NOTE: Static sites in Render blueprints do not support 'plan' or 'region' fields.
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: smart-campus-backend
          property: host
    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"
